services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: hasnat-ops:latest
    container_name: hasnat-ops
    ports:
      - "5000:3000"
    environment:
      # Contact endpoint — see .env.example. Compose reads these from a local
      # .env file automatically; unset RESEND_API_KEY = log-only dev mode.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-ch.hsyahmedgoheer@gmail.com}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL:-onboarding@resend.dev}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/robots.txt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
